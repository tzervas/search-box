name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Local-parity checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Local-parity checks
        run: bash scripts/check.sh
